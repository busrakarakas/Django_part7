{% extends 'base.html' %}

{% block icerik %}
<div class="kart" style="background:white; color:black; padding:40px; border-radius:15px; width:500px; margin:auto; box-shadow:0px 10px 25px rgba(0,0,0,0.3);">
    <h1>{{ proje.baslik }}</h1>
    <p>{{ proje.detay }}</p>
    <p><strong>Eklenme Tarihi:</strong> {{ proje.eklenme_tarihi }}</p>
    <br>
    <a href="{% url 'anasayfa' %}">
        <button style="background:#764ba2; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">Geri Dön</button>
    </a>
</div>
{% endblock %}
